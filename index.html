<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Variety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#111111;--surface:#1a1a1c;--card:#222225;--accent:#c9953c;
            --accent-h:#daa84f;--accent-glow:rgba(201,149,60,0.18);
            --fg:#f0ebe3;--muted:#8a8580;--border:#2e2e32;--border-h:#444;
            --success:#34d399;--error:#f87171;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
        h1,h2,h3{font-family:'Playfair Display',serif}
        body::before{content:'';position:fixed;inset:-50%;width:200%;height:200%;
            background:radial-gradient(ellipse at 20% 50%,rgba(201,149,60,.03)0%,transparent 50%),
                        radial-gradient(ellipse at 80% 20%,rgba(201,149,60,.02)0%,transparent 50%);
            animation:bgF 20s ease-in-out infinite alternate;pointer-events:none;z-index:-1}
        @keyframes bgF{0%{transform:translate(0,0)}100%{transform:translate(-3%,2%)}}

        #loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .5s}
        #loader.hide{opacity:0;pointer-events:none}
        .ld-grid{display:grid;grid-template-columns:repeat(3,12px);gap:8px}
        .ld-grid span{width:12px;height:12px;border-radius:3px;background:var(--accent);opacity:.15;animation:ldP 1.2s ease-in-out infinite}
        .ld-grid span:nth-child(1){animation-delay:0s}.ld-grid span:nth-child(2){animation-delay:.1s}
        .ld-grid span:nth-child(3){animation-delay:.2s}.ld-grid span:nth-child(4){animation-delay:.3s}
        .ld-grid span:nth-child(5){animation-delay:.4s}.ld-grid span:nth-child(6){animation-delay:.5s}
        .ld-grid span:nth-child(7){animation-delay:.6s}.ld-grid span:nth-child(8){animation-delay:.7s}
        .ld-grid span:nth-child(9){animation-delay:.8s}
        @keyframes ldP{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:1;transform:scale(1.25)}}

        #banner{position:relative;width:100%;overflow:hidden;background:var(--surface);min-height:120px}
        #banner img{width:100%;height:auto;display:block}

        .variant-card{background:var(--card);border:2px solid var(--border);border-radius:16px;overflow:hidden;
            transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
        .variant-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.25);border-color:var(--border-h)}
        .variant-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 32px var(--accent-glow)}
        .variant-card.clickable{cursor:pointer}

        .card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px}
        .clr-sw{width:18px;height:18px;border-radius:50%;border:2px solid rgba(128,128,128,.25);flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.15)}
        .clr-nm{font-weight:600;font-size:13px;margin-left:7px}
        .card-pr{font-weight:700;font-size:13px;color:var(--accent)}

        .card-img{padding:0 12px}
        .card-img img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;background:var(--surface);display:block}

        .card-sizes{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px 8px}
        .sz-pill{display:flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:8px;
            border:1.5px solid var(--border);background:var(--surface);color:var(--fg);min-width:44px;
            transition:all .2s ease;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px}
        .sz-pill:hover:not(:disabled):not(.sel){border-color:var(--accent);background:rgba(201,149,60,.08)}
        .sz-pill.sel{background:var(--accent);border-color:var(--accent);color:#111;font-weight:600;
            box-shadow:0 3px 12px var(--accent-glow);transform:scale(1.05)}
        .sz-pill.sel .sz-stk{color:rgba(0,0,0,.5)}
        .sz-pill.oos{opacity:.25;cursor:not-allowed;pointer-events:none}
        .sz-pill.oos .sz-lbl{text-decoration:line-through}
        .sz-stk{font-size:9px;color:var(--muted);margin-top:1px}

        .card-stk{padding:0 12px 6px;font-size:11px;color:var(--muted)}

        .card-actions{display:flex;align-items:center;gap:6px;padding:8px 12px 12px;border-top:1px solid var(--border);margin-top:auto}
        .c-qty-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--surface);
            border:1.5px solid var(--border);border-radius:8px;color:var(--fg);cursor:pointer;transition:all .2s;font-size:15px;font-weight:600;flex-shrink:0}
        .c-qty-btn:hover{border-color:var(--accent);color:var(--accent)}
        .c-qty-in{width:38px;height:30px;text-align:center;background:var(--surface);border:1.5px solid var(--border);
            border-radius:8px;color:var(--fg);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;outline:none;flex-shrink:0}
        .c-qty-in:focus{border-color:var(--accent)}
        .c-add{flex:1;padding:7px 10px;background:var(--accent);color:#111;font-size:12px;font-weight:700;
            border:none;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;white-space:nowrap}
        .c-add:hover{background:var(--accent-h)}
        .c-add:active{transform:scale(.97)}
        .c-add:disabled{opacity:.3;cursor:not-allowed;transform:none}

        .size-only-head{padding:10px 12px 0;font-weight:600;font-size:12px;color:var(--muted)}

        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        .shake{animation:shake .35s ease}
        @keyframes addedPulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:none}}
        .card-added{animation:addedPulse .5s ease}
        @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .cart-enter{animation:slideIn .25s ease}

        .order-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
        .fi{width:100%;padding:9px 11px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;
            color:var(--fg);font-size:13px;font-family:'DM Sans',sans-serif;transition:border-color .2s;outline:none}
        .fi:focus{border-color:var(--accent)}
        .fi::placeholder{color:var(--muted)}
        .fl{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}

        .btn-p{width:100%;padding:12px 20px;background:var(--accent);color:#111;font-size:14px;font-weight:700;
            border:none;border-radius:11px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
        .btn-p:hover{background:var(--accent-h);transform:translateY(-1px)}
        .btn-p:active{transform:scale(.98)}
        .btn-p:disabled{opacity:.35;cursor:not-allowed;transform:none}

        .rm-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:transparent;
            border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;transition:all .2s;font-size:10px;flex-shrink:0}
        .rm-btn:hover{background:rgba(248,113,113,.1);border-color:var(--error);color:var(--error)}

        .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(100px);opacity:0;
            padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:10000;
            transition:all .35s cubic-bezier(.4,0,.2,1);max-width:90vw;white-space:nowrap}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        .toast.ok{background:#065f46;color:#d1fae5;border:1px solid #10b981}
        .toast.err{background:#7f1d1d;color:#fecaca;border:1px solid #f87171}

        .modal-ov{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
            display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .3s}
        .modal-ov.show{opacity:1;pointer-events:all}
        .modal-ct{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;
            max-width:400px;width:100%;transform:scale(.9);transition:transform .3s;text-align:center}
        .modal-ov.show .modal-ct{transform:scale(1)}

        .desc-toggle{cursor:pointer;color:var(--accent);font-size:11px;font-weight:600;border:none;background:none;
            font-family:'DM Sans',sans-serif;padding:0;margin-top:2px}
        .desc-toggle:hover{text-decoration:underline}

        .err-box{background:rgba(127,29,29,.15);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:14px;margin-top:10px;text-align:left}
        .err-box code{display:block;margin-top:6px;padding:8px;background:rgba(0,0,0,.4);border-radius:6px;
            font-size:10px;color:#fca5a5;word-break:break-all;font-family:monospace;white-space:pre-wrap;line-height:1.4}

        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

<div id="loader">
    <div class="ld-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <p style="color:var(--muted);font-size:13px;letter-spacing:1px">LOADING PRODUCT</p>
    <p id="loader-status" style="color:var(--muted);font-size:10px;opacity:.5;margin-top:-6px"></p>
</div>

<div id="err-state" class="hidden fixed inset-0 z-[9998] bg-[var(--bg)] flex items-center justify-center p-5" style="overflow-y:auto">
    <div class="text-center max-w-lg w-full">
        <i class="fas fa-exclamation-triangle text-3xl mb-3" style="color:var(--error)"></i>
        <h2 class="text-lg font-bold mb-2">Failed to Load</h2>
        <p id="err-msg" style="color:var(--muted);font-size:13px;white-space:pre-line" class="mb-2"></p>
        <div id="err-detail" class="err-box hidden"><code id="err-code"></code></div>
        <div class="flex gap-2 justify-center mt-4 flex-wrap">
            <button onclick="location.reload()" class="btn-p" style="width:auto;padding:10px 24px;font-size:13px"><i class="fas fa-redo mr-1"></i>Retry</button>
            <button onclick="testConnection()" class="btn-p" style="width:auto;padding:10px 24px;font-size:13px;background:transparent;color:var(--accent);border:1.5px solid var(--accent)"><i class="fas fa-stethoscope mr-1"></i>Diagnose</button>
        </div>
        <div id="diag-result" class="err-box hidden mt-3 text-left"></div>
    </div>
</div>

<div id="app" class="hidden">

    <!-- Banner: hanya gambar, tanpa overlay teks -->
    <header id="banner">
        <img id="banner-img" src="" alt="Banner">
    </header>

    <main class="max-w-7xl mx-auto px-3 sm:px-5 py-4 lg:py-10">
        <div class="grid lg:grid-cols-5 gap-4 lg:gap-10">

            <!-- Kiri: Kategori + Judul + Harga + Deskripsi + Variant -->
            <div class="lg:col-span-3 space-y-3 lg:space-y-6">

                <!-- Kategori dan Judul — mengalir normal di bawah banner -->
                <div>
                    <span id="cat-badge" class="inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold mb-2" style="background:var(--accent);color:#111;letter-spacing:.5px"></span>
                    <h1 id="prod-name" class="text-2xl sm:text-3xl font-black leading-tight"></h1>
                </div>

                <div id="price-block"></div>

                <div id="desc-block" class="hidden">
                    <div id="desc-text" style="color:var(--muted);font-size:12px;line-height:1.6"></div>
                    <button id="desc-btn" class="desc-toggle">Read more</button>
                </div>

                <section id="variant-section">
                    <h2 class="font-bold mb-2" style="font-size:14px">
                        <i class="fas fa-swatchbook mr-1.5" style="color:var(--accent);font-size:13px"></i>Select Variant
                    </h2>
                    <div id="variant-cards"></div>
                </section>
            </div>

            <!-- Kanan: Order Summary + Form -->
            <div class="lg:col-span-2">
                <div class="lg:sticky lg:top-4 space-y-3 lg:space-y-5">
                    <div class="order-card">
                        <h2 class="font-bold mb-2" style="font-size:14px">
                            <i class="fas fa-receipt mr-1.5" style="color:var(--accent);font-size:13px"></i>Order Summary
                        </h2>
                        <div id="cart-empty" class="text-center py-5" style="color:var(--muted);font-size:12px">
                            <i class="fas fa-shopping-bag text-lg mb-1 block" style="opacity:.25"></i>No items yet
                        </div>
                        <div id="cart-items" class="space-y-2 hidden"></div>
                        <div id="cart-totals" class="hidden mt-3 pt-3" style="border-top:1px solid var(--border)">
                            <div class="flex justify-between text-xs mb-1"><span style="color:var(--muted)">Subtotal</span><span id="t-sub"></span></div>
                            <div class="flex justify-between text-xs mb-2"><span style="color:var(--muted)">Shipping</span><span id="t-ship"></span></div>
                            <div class="flex justify-between font-bold text-base pt-2" style="border-top:1px solid var(--border)"><span>Total</span><span id="t-total" style="color:var(--accent)"></span></div>
                        </div>
                    </div>
                    <div class="order-card">
                        <h2 class="font-bold mb-3" style="font-size:14px">
                            <i class="fas fa-truck mr-1.5" style="color:var(--accent);font-size:13px"></i>Shipping Details
                        </h2>
                        <form id="buyer-form" class="space-y-2.5" autocomplete="off" novalidate>
                            <div><label class="fl" for="f-name">Full Name <span style="color:var(--error)">*</span></label><input class="fi" id="f-name" type="text" placeholder="John Doe" required></div>
                            <div><label class="fl" for="f-phone">Phone <span style="color:var(--error)">*</span></label><input class="fi" id="f-phone" type="tel" placeholder="+1 234 567 8900" required></div>
                            <div><label class="fl" for="f-email">Email</label><input class="fi" id="f-email" type="email" placeholder="john@example.com"></div>
                            <div><label class="fl" for="f-country">Country <span style="color:var(--error)">*</span></label><select class="fi" id="f-country" required><option value="">Select country</option></select></div>
                            <div><label class="fl" for="f-addr">Full Address <span style="color:var(--error)">*</span></label><textarea class="fi" id="f-addr" rows="2" placeholder="Street, city, state, zip..." required style="resize:vertical"></textarea></div>
                            <p id="form-err" class="hidden text-xs" style="color:var(--error)"></p>
                        </form>
                    </div>
                    <button class="btn-p" id="submit-btn" disabled style="padding:13px;font-size:14px">
                        <i class="fas fa-lock mr-1.5" style="font-size:12px"></i>Place Order
                    </button>
                    <p class="text-center" style="font-size:10px;color:var(--muted);opacity:.4"><i class="fas fa-shield-alt mr-1"></i>Secure checkout via PayPal</p>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-section" class="hidden"><img id="footer-img" src="" alt="" style="width:100%;max-height:120px;object-fit:cover;opacity:.4"></div>
</div>

<div id="success-modal" class="modal-ov">
    <div class="modal-ct">
        <div class="w-12 h-12 rounded-full mx-auto mb-3 flex items-center justify-center" style="background:rgba(52,211,153,.15)">
            <i class="fas fa-check text-lg" style="color:var(--success)"></i>
        </div>
        <h2 class="text-lg font-bold mb-1">Order Placed</h2>
        <p id="modal-oid" class="text-xs mb-1" style="color:var(--muted)"></p>
        <p id="modal-total" class="text-lg font-bold mb-4" style="color:var(--accent)"></p>
        <p class="text-xs mb-4" style="color:var(--muted);line-height:1.5">Complete payment via the PayPal link.<br>Confirmation email has been sent.</p>
        <button class="btn-p" id="modal-close" style="width:auto;display:inline-block;padding:10px 32px;font-size:13px">Done</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const CFG = {
    SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzpj6MdFIKB3NviKkZ-AQhkEUKY_Utxdga6COXsyPadqBOUZdnXhZ-lMCEzvYN630UyQg/exec',
    SELLER_EMAIL: 'novavariety@gmail.com',
    PAYPAL_ME: 'https://www.paypal.com/paypalme/my/profile'
};
const COUNTRIES = ['United States','United Kingdom','Canada','Australia','Germany','France','Netherlands','Italy','Spain','Japan','South Korea','Singapore','Malaysia','Thailand','Philippines','Indonesia','India','Saudi Arabia','UAE','Brazil','Mexico','New Zealand','Sweden','Switzerland','Belgium','Poland','Portugal','Ireland','Turkey','South Africa','Nigeria','Argentina','Chile','Vietnam','Hong Kong','Taiwan','Pakistan','Bangladesh','Myanmar','Cambodia','Russia','Egypt','Colombia','Peru','Kenya'];

let product = null, variants = [], cart = [];
const SHEET = new URLSearchParams(window.location.search).get('sheet') || 'Long_Sleeve';

document.addEventListener('DOMContentLoaded', () => {
    const sel = document.getElementById('f-country');
    COUNTRIES.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
    document.getElementById('submit-btn').addEventListener('click', submitOrder);
    document.getElementById('modal-close').addEventListener('click', () => document.getElementById('success-modal').classList.remove('show'));
    document.getElementById('desc-btn').addEventListener('click', toggleDesc);

    const vc = document.getElementById('variant-cards');
    vc.addEventListener('click', function(e) {
        const card = e.target.closest('.variant-card');
        if (!card) return;
        const pill = e.target.closest('.sz-pill');
        if (pill && !pill.disabled) {
            card.querySelectorAll('.sz-pill.sel').forEach(p => p.classList.remove('sel'));
            pill.classList.add('sel'); card.classList.add('selected');
            card.dataset.selSku = pill.dataset.sku; card.dataset.selSize = pill.dataset.size;
            card.dataset.selStock = pill.dataset.stock; card.dataset.selPrice = pill.dataset.price;
            card.dataset.selWeight = pill.dataset.weight; card.dataset.selImg = pill.dataset.img;
            if (pill.dataset.img) { const img = card.querySelector('.card-img img'); if (img) img.src = fixImg(pill.dataset.img); }
            const inp = card.querySelector('.c-qty-in'); if (inp) inp.value = 1;
            return;
        }
        if (e.target.closest('.c-qty-minus')) { const inp = card.querySelector('.c-qty-in'); inp.value = Math.max(1, (parseInt(inp.value)||1)-1); return; }
        if (e.target.closest('.c-qty-plus')) { const inp = card.querySelector('.c-qty-in'); inp.value = Math.min((parseInt(inp.value)||1)+1, cardMax(card)); return; }
        if (e.target.closest('.c-add') && !e.target.closest('.c-add').disabled) { addFromCard(card); return; }
        if (card.classList.contains('clickable') && !card.dataset.oos) {
            vc.querySelectorAll('.variant-card.selected').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            card.dataset.selSku = card.dataset.sku; card.dataset.selSize = '';
            card.dataset.selStock = card.dataset.stock; card.dataset.selPrice = card.dataset.price;
            card.dataset.selWeight = card.dataset.weight; card.dataset.selImg = card.dataset.img;
            const inp = card.querySelector('.c-qty-in'); if (inp) inp.value = 1;
        }
    });
    vc.addEventListener('input', function(e) {
        if (e.target.classList.contains('c-qty-in')) {
            const card = e.target.closest('.variant-card');
            let v = parseInt(e.target.value)||1;
            if (card) v = Math.min(v, cardMax(card));
            e.target.value = Math.max(1, v);
        }
    });
    fetchProduct();
});

function cardMax(card) { const s = parseInt(card.dataset.selStock); return (s && s > 0) ? s : 999; }

// =============================================
// Fix URL gambar — GitHub & Google Drive auto-fix
// =============================================
function fixImg(url) {
    if (!url || typeof url !== 'string') return '';
    url = url.trim();
    if (url.indexOf('github.com/') !== -1 && url.indexOf('/blob/') !== -1 && url.indexOf('?raw=true') === -1) {
        url += '?raw=true';
    }
    if (url.indexOf('drive.google.com/file/d/') !== -1) {
        var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (m) return 'https://drive.google.com/uc?export=view&id=' + m[1];
    }
    if (url.indexOf('drive.google.com/open?id=') !== -1) {
        var m2 = url.match(/id=([a-zA-Z0-9_-]+)/);
        if (m2) return 'https://drive.google.com/uc?export=view&id=' + m2[1];
    }
    return url;
}

// =============================================
// Hex → RGBA helpers
// =============================================
function hexToRgba(hex, a) {
    if (!hex || hex.length < 4) return '';
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    if (hex.length !== 6) return '';
    const r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
    if (isNaN(r)||isNaN(g)||isNaN(b)) return '';
    return 'rgba('+r+','+g+','+b+','+a+')';
}

function applyCardBg(card, code) {
    if (!code) return;
    const c1 = hexToRgba(code, 0.15), c2 = hexToRgba(code, 0.04);
    if (c1) card.style.background = 'linear-gradient(155deg,'+c1+' 0%,'+c2+' 35%,var(--card) 100%)';
}

function deriveBorder(hex) {
    if (!hex || hex.length < 4) return '';
    hex = hex.replace('#',''); if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]; if (hex.length !== 6) return '';
    const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
    if(isNaN(r)||isNaN(g)||isNaN(b)) return '';
    return (0.299*r+0.587*g+0.114*b)/255>0.5?'rgba(0,0,0,0.12)':'rgba(255,255,255,0.08)';
}

function deriveSurface(hex) {
    if (!hex || hex.length < 4) return '';
    hex = hex.replace('#',''); if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]; if (hex.length !== 6) return '';
    const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
    if(isNaN(r)||isNaN(g)||isNaN(b)) return '';
    return (0.299*r+0.587*g+0.114*b)/255>0.5?'rgba(0,0,0,0.06)':'rgba(255,255,255,0.04)';
}

function deriveMuted(hex) {
    if (!hex || hex.length < 4) return '';
    hex = hex.replace('#',''); if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]; if (hex.length !== 6) return '';
    const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
    if(isNaN(r)||isNaN(g)||isNaN(b)) return '';
    return (0.299*r+0.587*g+0.114*b)/255>0.5?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.5)';
}

function deriveBorderHover(hex) {
    if (!hex || hex.length < 4) return '';
    hex = hex.replace('#',''); if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]; if (hex.length !== 6) return '';
    const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
    if(isNaN(r)||isNaN(g)||isNaN(b)) return '';
    return (0.299*r+0.587*g+0.114*b)/255>0.5?'rgba(0,0,0,0.22)':'rgba(255,255,255,0.15)';
}

// =============================================
// Fetch Product
// =============================================
async function fetchProduct() {
    const st = document.getElementById('loader-status');
    try {
        st.textContent = 'Connecting...';
        const ctrl = new AbortController(), tid = setTimeout(() => ctrl.abort(), 20000);
        let res;
        try { res = await fetch(CFG.SCRIPT_URL+'?sheet='+encodeURIComponent(SHEET)+'&_t='+Date.now(), {signal:ctrl.signal}); }
        catch(e) { clearTimeout(tid); throw e.name==='AbortError'?{type:'timeout',message:'Timeout 20s'}:{type:'network',message:e.message}; }
        clearTimeout(tid);
        st.textContent = 'Parsing...';
        if (!res.ok) { const t = await res.text().catch(()=>''); throw {type:'http',status:res.status,body:t}; }
        const raw = await res.text();
        let data; try { data = JSON.parse(raw); } catch { throw {type:'parse',body:raw}; }
        if (!data.success) throw {type:'server',message:data.error||'Server error',data};
        if (!data.product) throw {type:'data',message:'No product data',data};
        st.textContent = 'Rendering...';
        product = data.product; variants = data.variants || [];

        if (product.bgColor) { document.documentElement.style.setProperty('--bg', product.bgColor); document.body.style.background = product.bgColor; }
        if (product.cardBg) {
            document.documentElement.style.setProperty('--card', product.cardBg);
            const bdr = deriveBorder(product.cardBg); if (bdr) document.documentElement.style.setProperty('--border', bdr);
            const srf = deriveSurface(product.cardBg); if (srf) document.documentElement.style.setProperty('--surface', srf);
        }
        if (product.cardText) {
            document.documentElement.style.setProperty('--fg', product.cardText);
            const mut = deriveMuted(product.cardText); if (mut) document.documentElement.style.setProperty('--muted', mut);
            const bh = deriveBorderHover(product.cardText); if (bh) document.documentElement.style.setProperty('--border-h', bh);
        }

        if (product.gtmId) { const s=document.createElement('script'); s.textContent="(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','"+product.gtmId+"');"; document.head.prepend(s); }
        if (product.ga4Id) { const s=document.createElement('script'); s.src='https://www.googletagmanager.com/gtag/js?id='+product.ga4Id; document.head.prepend(s); const s2=document.createElement('script'); s2.textContent="window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','"+product.ga4Id+"');"; document.head.appendChild(s2); }
        renderProduct();
        document.getElementById('loader').classList.add('hide');
        document.getElementById('app').classList.remove('hidden');
    } catch(err) {
        let msg='',det='';
        if(err.type==='timeout'){msg='Server tidak merespon 20 detik.';det='Timeout\n'+CFG.SCRIPT_URL;}
        else if(err.type==='network'){msg='Gagal terhubung. Pastikan deployment "Anyone".';det=err.message;}
        else if(err.type==='http'){msg='HTTP '+err.status;det=(err.body||'').substring(0,400);}
        else if(err.type==='parse'){msg='Bukan JSON. Cek Executions di Apps Script.';det=(err.body||'').substring(0,400);}
        else if(err.type==='server'){msg=err.message;if(msg.includes('Sheet not found'))msg+='\n\nSheet: "'+SHEET+'" — case-sensitive.';det=JSON.stringify(err.data);}
        else{msg=err.message||'Error';det=String(err);}
        document.getElementById('err-msg').textContent=msg;
        document.getElementById('err-code').textContent=det;
        document.getElementById('err-detail').classList.remove('hidden');
        document.getElementById('err-state').classList.remove('hidden');
        document.getElementById('loader').classList.add('hide');
    }
}

async function testConnection() {
    const d=document.getElementById('diag-result'); d.classList.remove('hidden');
    d.innerHTML='<p style="color:var(--accent);font-size:11px"><i class="fas fa-spinner fa-spin mr-1"></i>Diagnosing...</p>';
    let r=[];
    try{const res=await fetch(CFG.SCRIPT_URL+'?sheet='+encodeURIComponent(SHEET)+'&_t='+Date.now(),{signal:AbortSignal.timeout(15000)});
    r.push('HTTP '+res.status);const txt=await res.text();try{const j=JSON.parse(txt);r.push(j.success?'OK — product: '+(j.product?.name||'-')+', variants: '+(j.variants?.length||0):'FAIL — '+j.error);}catch{r.push('FAIL — bukan JSON: '+txt.substring(0,150));}}catch(e){r.push('FAIL — '+e.message);}
    r.push('Sheet: "'+SHEET+'"');
    d.innerHTML=r.map(x=>'<p style="font-size:10px;color:var(--muted);margin-bottom:2px">'+x+'</p>').join('');
}

// =============================================
// Render
// =============================================
function renderProduct() {
    const be = document.getElementById('banner-img');
    if(product.bannerImage){be.src=fixImg(product.bannerImage);be.style.display='block';}
    else if(product.productImage){be.src=fixImg(product.productImage);be.style.display='block';}
    else{be.style.display='none';document.getElementById('banner').style.display='none';}

    // Kategori dan judul — sekarang di luar banner, mengalir normal
    const ce=document.getElementById('cat-badge');
    if(product.category){ce.textContent=product.category;ce.style.display='';}else{ce.style.display='none';}
    document.getElementById('prod-name').textContent=product.name||'Product';

    const cur=product.currency||'USD', price=Number(product.sellingPrice)||0;
    document.getElementById('price-block').innerHTML='<span style="font-size:22px;font-weight:800;color:var(--accent)">'+fmtPrice(price,cur)+'</span>';
    if(product.description&&product.description.trim()){const b=document.getElementById('desc-block');b.classList.remove('hidden');const t=product.description.trim(),l=t.split('\n');if(l.length>3){document.getElementById('desc-text').innerHTML=l.slice(0,3).join('<br>')+'<span id="desc-more" class="hidden">'+l.slice(3).join('<br>')+'</span>';document.getElementById('desc-btn').classList.remove('hidden');document.getElementById('desc-btn').textContent='Read more';document.getElementById('desc-btn').dataset.open='0';}else{document.getElementById('desc-text').innerHTML=t.replace(/\n/g,'<br>');document.getElementById('desc-btn').classList.add('hidden');}}
    if(product.footerImage){document.getElementById('footer-section').classList.remove('hidden');document.getElementById('footer-img').src=fixImg(product.footerImage);}
    renderVariantCards();
}

function toggleDesc(){const b=document.getElementById('desc-btn'),m=document.getElementById('desc-more');if(b.dataset.open==='0'){m.classList.remove('hidden');b.textContent='Show less';b.dataset.open='1';}else{m.classList.add('hidden');b.textContent='Read more';b.dataset.open='0';}}

// =============================================
// VARIANT CARDS
// =============================================
function renderVariantCards() {
    const c = document.getElementById('variant-cards'); c.innerHTML = '';
    if(product.skuMode==='off'){document.getElementById('variant-section').classList.add('hidden');return;}
    if(!variants.length){c.innerHTML='<p style="color:var(--muted);font-size:12px;padding:10px 0">No variants.</p>';return;}
    const hc=variants.some(v=>v.color&&v.color.trim()!==''), hs=variants.some(v=>v.size&&v.size.trim()!=='');
    if(hc&&hs) renderColorSize(c);
    else if(hc) renderColorOnly(c);
    else if(hs) renderSizeOnly(c);
    else renderColorOnly(c);
}

function renderColorSize(container) {
    const groups = groupByColor();
    container.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
    Object.entries(groups).forEach(([name, grp]) => {
        const card = document.createElement('div');
        card.className = 'variant-card';
        card.dataset.color = name; card.dataset.colorcode = grp.colorCode||'';
        applyCardBg(card, grp.colorCode);
        const prices = grp.sizes.map(s=>Number(s.price)).filter(p=>p>0);
        const mn=prices.length?Math.min(...prices):Number(product.sellingPrice)||0, mx=prices.length?Math.max(...prices):mn;
        const ps=mn===mx?fmtPrice(mn):fmtPrice(mn)+' – '+fmtPrice(mx), showP=mn!==mx;
        let h='<div class="card-head"><div class="flex items-center"><span class="clr-sw" style="background:'+(grp.colorCode||'#888')+'"></span><span class="clr-nm">'+esc(name)+'</span></div><span class="card-pr">'+ps+'</span></div>';
        if(grp.image) h+='<div class="card-img"><img src="'+fixImg(grp.image)+'" alt="'+esc(name)+'" loading="lazy"></div>';
        h+='<div class="card-sizes">';
        grp.sizes.forEach(s=>{const stk=Number(s.stock)||0,oos=stk<=0;h+='<button class="sz-pill'+(oos?' oos':'')+'" type="button" data-sku="'+esc(s.sku)+'" data-size="'+esc(s.size)+'" data-stock="'+stk+'" data-price="'+(Number(s.price)||0)+'" data-weight="'+(Number(s.weight)||0)+'" data-img="'+fixImg(esc(s.variantImage||''))+'" '+(oos?'disabled':'')+'><span class="sz-lbl">'+esc(s.size)+(showP&&Number(s.price)>0?'<br>'+fmtPrice(Number(s.price)):'')+'</span><span class="sz-stk">'+(oos?'Sold out':stk+' left')+'</span></button>';});
        h+='</div>'+cardActionsHTML(false);
        card.innerHTML = h; container.appendChild(card);
    });
}

function renderColorOnly(container) {
    container.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
    variants.forEach(v => {
        const stk=Number(v.stock)||0, oos=stk<=0;
        const card = document.createElement('div');
        card.className = 'variant-card clickable';
        if(oos){card.style.opacity='.35';card.dataset.oos='1';}
        card.dataset.color=v.color||'Default'; card.dataset.colorcode=v.colorCode||'';
        card.dataset.sku=v.sku||''; card.dataset.stock=stk;
        card.dataset.price=Number(v.price)||0; card.dataset.weight=Number(v.weight)||0;
        card.dataset.img=fixImg(v.variantImage||'');
        applyCardBg(card, v.colorCode);
        const price=Number(v.price)||Number(product.sellingPrice)||0;
        let h='<div class="card-head"><div class="flex items-center"><span class="clr-sw" style="background:'+(v.colorCode||'#888')+'"></span><span class="clr-nm">'+esc(v.color||'Default')+'</span></div><span class="card-pr">'+fmtPrice(price)+'</span></div>';
        if(v.variantImage) h+='<div class="card-img"><img src="'+fixImg(esc(v.variantImage))+'" alt="'+esc(v.color)+'" loading="lazy"></div>';
        h+='<div class="card-stk"><i class="fas fa-cube" style="font-size:9px"></i> '+(oos?'<span style="color:var(--error)">Out of stock</span>':stk+' available')+'</div>';
        h+=cardActionsHTML(oos);
        card.innerHTML = h; container.appendChild(card);
    });
}

function renderSizeOnly(container) {
    container.className = '';
    const card = document.createElement('div');
    card.className = 'variant-card';
    card.dataset.color=''; card.dataset.colorcode='';
    const prices=variants.map(v=>Number(v.price)).filter(p=>p>0);
    const mn=prices.length?Math.min(...prices):Number(product.sellingPrice)||0, mx=prices.length?Math.max(...prices):mn, showP=mn!==mx;
    const img=fixImg(product.productImage||(variants.find(v=>v.variantImage)||{}).variantImage||'');
    let h='<div class="size-only-head">Select Size</div>';
    if(img) h+='<div class="card-img"><img src="'+img+'" alt="Product" loading="lazy"></div>';
    h+='<div class="card-sizes">';
    variants.forEach(v=>{const stk=Number(v.stock)||0,oos=stk<=0;h+='<button class="sz-pill'+(oos?' oos':'')+'" type="button" data-sku="'+esc(v.sku)+'" data-size="'+esc(v.size)+'" data-stock="'+stk+'" data-price="'+(Number(v.price)||0)+'" data-weight="'+(Number(v.weight)||0)+'" data-img="'+fixImg(esc(v.variantImage||''))+'" '+(oos?'disabled':'')+'><span class="sz-lbl">'+esc(v.size)+(showP&&Number(v.price)>0?'<br>'+fmtPrice(Number(v.price)):'')+'</span><span class="sz-stk">'+(oos?'Sold out':stk+' left')+'</span></button>';});
    h+='</div>'+cardActionsHTML(false);
    card.innerHTML = h; container.appendChild(card);
}

function cardActionsHTML(disabled) {
    return '<div class="card-actions"><div class="flex items-center gap-1"><button type="button" class="c-qty-btn c-qty-minus" aria-label="Minus" '+(disabled?'disabled':'')+'>−</button><input type="number" class="c-qty-in" value="1" min="1" aria-label="Qty" '+(disabled?'disabled':'')+'><button type="button" class="c-qty-btn c-qty-plus" aria-label="Plus" '+(disabled?'disabled':'')+'>+</button></div><button type="button" class="c-add" '+(disabled?'disabled':'')+'>'+(disabled?'Sold Out':'<i class="fas fa-cart-plus" style="font-size:11px"></i> Add')+'</button></div>';
}

function groupByColor() {
    const m={};
    variants.forEach(v=>{const k=v.color&&v.color.trim()?v.color.trim():'Default';if(!m[k])m[k]={colorCode:v.colorCode||'',image:v.variantImage||'',sizes:[]};if(!m[k].image&&v.variantImage)m[k].image=v.variantImage;m[k].sizes.push(v);});
    return m;
}

// =============================================
// Add from Card
// =============================================
function addFromCard(card) {
    const hasPills = card.querySelectorAll('.sz-pill').length > 0;
    if(hasPills && !card.dataset.selSku){card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),400);showToast('Select a size first','err');return;}
    if(!card.dataset.selSku){card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),400);showToast('Select a variant','err');return;}
    const qty=parseInt(card.querySelector('.c-qty-in').value)||1, stock=parseInt(card.dataset.selStock)||0;
    if(stock>0&&qty>stock){showToast('Only '+stock+' available','err');return;}
    const sku=card.dataset.selSku,color=card.dataset.color,colorCode=card.dataset.colorcode,
          size=card.dataset.selSize||'',up=parseFloat(card.dataset.selPrice)||Number(product.sellingPrice)||0,
          wt=parseFloat(card.dataset.selWeight)||0,img=card.dataset.selImg||'';
    const ex=cart.find(c=>c.sku===sku);
    if(ex){const nq=ex.qty+qty;if(stock>0&&nq>stock){showToast('Max stock reached','err');return;}ex.qty=nq;}
    else cart.push({sku,color,colorCode,size,qty,unitPrice:up,weight:wt,variantImage:img});
    card.classList.add('card-added');setTimeout(()=>card.classList.remove('card-added'),500);
    card.querySelector('.c-qty-in').value=1;
    renderCart(); showToast('Added to order','ok');
}

// =============================================
// Cart
// =============================================
function removeFromCart(i){cart.splice(i,1);renderCart();}
function renderCart() {
    const em=document.getElementById('cart-empty'),it=document.getElementById('cart-items'),to=document.getElementById('cart-totals'),sb=document.getElementById('submit-btn');
    if(!cart.length){em.classList.remove('hidden');it.classList.add('hidden');to.classList.add('hidden');sb.disabled=true;return;}
    em.classList.add('hidden');it.classList.remove('hidden');to.classList.remove('hidden');sb.disabled=false;
    const cur=product.currency||'USD';let h='',sub=0,tw=0;
    cart.forEach((item,i)=>{const t=item.unitPrice*item.qty;sub+=t;tw+=item.weight*item.qty;const lb=[item.color,item.size].filter(Boolean).join(' / ')||'Product';const lf=item.sku?lb+' ('+item.sku+')':lb;h+='<div class="cart-enter flex items-center gap-2 p-2 rounded-lg" style="background:var(--surface)">'+(item.variantImage?'<img src="'+fixImg(item.variantImage)+'" class="w-9 h-9 rounded-lg object-cover flex-shrink-0" style="background:var(--card)" alt="">':'')+'<div class="flex-1 min-w-0"><p class="text-xs font-semibold truncate">'+esc(lf)+'</p><p style="color:var(--muted);font-size:10px">'+fmtPrice(item.unitPrice,cur)+' x '+item.qty+'</p></div><div class="flex items-center gap-1 flex-shrink-0"><span class="text-xs font-bold">'+fmtPrice(t,cur)+'</span><button class="rm-btn" onclick="removeFromCart('+i+')" aria-label="Remove"><i class="fas fa-times"></i></button></div></div>';});
    it.innerHTML=h;
    const sk=Number(product.shippingCostPerKg)||0,se=Number(product.shipExtraPercent)||0;
    let sc=(sk>0&&tw>0)?tw*sk*(1+se/100):0;const gr=sub+sc;
    document.getElementById('t-sub').textContent=fmtPrice(sub,cur);
    document.getElementById('t-ship').textContent=sc>0?fmtPrice(sc,cur):'Free';
    document.getElementById('t-total').textContent=fmtPrice(gr,cur);
}

// =============================================
// Submit Order
// =============================================
async function submitOrder() {
    const n=document.getElementById('f-name').value.trim(),ph=document.getElementById('f-phone').value.trim(),
          em=document.getElementById('f-email').value.trim(),co=document.getElementById('f-country').value,
          ad=document.getElementById('f-addr').value.trim(),fe=document.getElementById('form-err');
    if(!n||!ph||!co||!ad){fe.textContent='Fill all required fields.';fe.classList.remove('hidden');document.getElementById('buyer-form').scrollIntoView({behavior:'smooth',block:'center'});return;}
    fe.classList.add('hidden');
    if(!cart.length){showToast('Cart empty','err');return;}
    const cur=product.currency||'USD',sub=cart.reduce((s,i)=>s+i.unitPrice*i.qty,0),
          tw=cart.reduce((s,i)=>s+i.weight*i.qty,0),sk=Number(product.shippingCostPerKg)||0,se=Number(product.shipExtraPercent)||0,
          sc=(sk>0&&tw>0)?tw*sk*(1+se/100):0,gt=sub+sc,
          oid='NV-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).substring(2,5).toUpperCase(),
          order={orderId:oid,date:new Date().toISOString(),buyer:{name:n,phone:ph,email:em,country:co,address:ad},
          items:cart.map(i=>({sku:i.sku,color:i.color,size:i.size,qty:i.qty,unitPrice:i.unitPrice,weight:i.weight})),
          subtotal:sub,shippingWeight:Math.round(tw*1000)/1000,shippingCost:Math.round(sc*100)/100,grandTotal:Math.round(gt*100)/100};
    const btn=document.getElementById('submit-btn');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin mr-1"></i>Processing...';
    try{
        const r=await fetch(CFG.SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'saveAndNotify',sheet:SHEET,order,sellerEmail:CFG.SELLER_EMAIL,productTitle:product.name||'Product'})});
        const tx=await r.text();let d;try{d=JSON.parse(tx);}catch{throw new Error('Invalid: '+tx.substring(0,150));}
        if(!d.success)throw new Error(d.error||'Server error');
        fetch(CFG.SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'trackEvent',sheet:SHEET,event:'purchase',orderId:oid,itemsCount:cart.length,revenue:gt,details:'Order by '+n})}).catch(()=>{});
        document.getElementById('modal-oid').textContent='Order ID: '+oid;
        document.getElementById('modal-total').textContent=fmtPrice(gt,cur);
        document.getElementById('success-modal').classList.add('show');
        cart=[];renderCart();document.getElementById('buyer-form').reset();
        document.querySelectorAll('#variant-cards .variant-card.selected').forEach(c=>c.classList.remove('selected'));
        document.querySelectorAll('#variant-cards .sz-pill.sel').forEach(p=>p.classList.remove('sel'));
        if(CFG.PAYPAL_ME){window.open(CFG.PAYPAL_ME.endsWith('/')?CFG.PAYPAL_ME+gt.toFixed(2):CFG.PAYPAL_ME+'/'+gt.toFixed(2),'_blank');}
    }catch(e){console.error(e);showToast('Failed: '+e.message,'err');}
    finally{btn.disabled=cart.length===0;btn.innerHTML='<i class="fas fa-lock mr-1.5" style="font-size:12px"></i>Place Order';}
}

// =============================================
// Utilities
// =============================================
function fmtPrice(v,c){const cc=c||product.currency||'USD',n=Number(v)||0;try{return new Intl.NumberFormat('en-US',{style:'currency',currency:cc,minimumFractionDigits:0,maximumFractionDigits:2}).format(n);}catch{return cc+' '+n.toFixed(2);}}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
let tt=null;
function showToast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t;clearTimeout(tt);requestAnimationFrame(()=>{e.classList.add('show');tt=setTimeout(()=>e.classList.remove('show'),2500);});}
</script>
